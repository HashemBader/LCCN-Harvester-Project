name: Build Standalone Executables

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
on:
  push:
    tags:
      - "v*"          # Any version tag, e.g. v1.0.0
  workflow_dispatch:   # Manual trigger from the GitHub Actions UI

# ---------------------------------------------------------------------------
# Jobs – one per platform, run in parallel
# ---------------------------------------------------------------------------
jobs:

  # =====================================================================
  # macOS build  →  LCCN Harvester.app  +  LCCN_Harvester.dmg
  # =====================================================================
  build-macos:
    name: macOS .app Bundle
    runs-on: macos-latest          # macOS 14 (Apple Silicon + x86_64)
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: macos-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: macos-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pyinstaller-hooks-contrib
          # Install project deps – fall back to core set if GitHub-hosted
          # package fails (e.g. network restrictions on the runner)
          pip install -r requirements.txt || pip install \
            "PyQt6>=6.4.0" \
            "requests>=2.28.0" \
            "python-stdnum>=2.2" \
            pymarc ply certifi \
            "git+https://github.com/asl2/PyZ3950.git"

      - name: Build with PyInstaller
        run: python -m PyInstaller --noconfirm --clean LCCN_Harvester.spec

      - name: Create DMG disk image
        run: |
          hdiutil create \
            -volname "LCCN Harvester" \
            -srcfolder "dist/LCCN Harvester.app" \
            -ov -format UDZO \
            dist/LCCN_Harvester.dmg

      - name: Upload macOS artefacts
        uses: actions/upload-artifact@v4
        with:
          name: LCCN-Harvester-macOS
          path: |
            dist/LCCN Harvester.app
            dist/LCCN_Harvester.dmg
          if-no-files-found: error
          retention-days: 30

  # =====================================================================
  # Windows build  →  LCCN_Harvester.exe  (single portable file)
  # =====================================================================
  build-windows:
    name: Windows .exe
    runs-on: windows-latest        # Windows Server 2022
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: windows-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: windows-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pyinstaller-hooks-contrib
          pip install -r requirements.txt
        shell: cmd

      - name: Build with PyInstaller
        run: python -m PyInstaller --noconfirm --clean LCCN_Harvester.spec
        shell: cmd

      - name: Upload Windows artefacts
        uses: actions/upload-artifact@v4
        with:
          name: LCCN-Harvester-Windows
          path: dist\LCCN_Harvester.exe
          if-no-files-found: error
          retention-days: 30

  # =====================================================================
  # Release job – attach artefacts to a GitHub Release when a tag is pushed
  # =====================================================================
  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download macOS artefacts
        uses: actions/download-artifact@v4
        with:
          name: LCCN-Harvester-macOS
          path: release/macos

      - name: Download Windows artefacts
        uses: actions/download-artifact@v4
        with:
          name: LCCN-Harvester-Windows
          path: release/windows

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LCCN Harvester ${{ github.ref_name }}"
          body: |
            ## LCCN Harvester ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | macOS    | `LCCN_Harvester.dmg` | Drag `LCCN Harvester.app` to Applications |
            | Windows  | `LCCN_Harvester.exe` | Single portable file – no installation needed |

            ### Requirements
            **None** – Python is bundled inside the executable.

            ### First launch
            * **macOS**: Right-click → Open (or System Preferences → Privacy & Security → Allow)
              because the app is not yet notarized with an Apple Developer certificate.
            * **Windows**: Click "More info → Run anyway" in the SmartScreen prompt
              (unsigned executable).

            ### Data & settings location
            | Platform | Path |
            |----------|------|
            | macOS    | `~/Library/Application Support/LCCN Harvester/` |
            | Windows  | `%APPDATA%\LCCN Harvester\` |
          files: |
            release/macos/LCCN_Harvester.dmg
            release/windows/LCCN_Harvester.exe
          draft: false
          prerelease: false
